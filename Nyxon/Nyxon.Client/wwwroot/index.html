<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; 
             script-src 'self' 'unsafe-eval' 'unsafe-inline'; 
             style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; 
             font-src 'self' https://cdnjs.cloudflare.com; 
             img-src 'self' data:; 
             object-src 'none';">
    <title>Frontend</title>
    <base href="/" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
    <div id="app">
        <div class="loading-screen"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="js/argon2-bundled.min.js"></script>
    <script src="js/argon2.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="ws.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chatScroll.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        window.clipboardCopy = {
            copyText: function (text) {
                // 1. Try modern API (if HTTPS or Localhost)
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    return navigator.clipboard.writeText(text);
                }
                // 2. Fallback for HTTP (Development)
                else {
                    return new Promise((resolve, reject) => {
                        var textArea = document.createElement("textarea");
                        textArea.value = text;

                        // Hide it but keep it part of the DOM
                        textArea.style.position = "fixed";
                        textArea.style.left = "-9999px";
                        textArea.style.top = "0";
                        document.body.appendChild(textArea);

                        textArea.focus();
                        textArea.select();

                        try {
                            var successful = document.execCommand('copy');
                            if (successful) resolve();
                            else reject("Copy command failed");
                        } catch (err) {
                            reject(err);
                        } finally {
                            document.body.removeChild(textArea);
                        }
                    });
                }
            }
        };
    </script>

</body>

</html>
