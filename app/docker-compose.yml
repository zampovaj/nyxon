services:
  postgres:
    image: postgres:17
    container_name: msgapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: msgapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:9
    container_name: msgapp_valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

  backend:
      build: ./Backend
      container_name: msgapp_backend
      restart: unless-stopped
      ports:
        - "5000:8080"
      depends_on:
        - postgres
        - valkey

volumes:
  postgres_data:
  valkey_data: